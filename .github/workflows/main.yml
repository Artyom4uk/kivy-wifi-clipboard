name: Build APK and EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Позволяет запускать сборку вручную кнопкой

jobs:
  # --- СБОРКА ПОД ANDROID ---
  android-build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - name: Get Buildozer Action
      uses: ArtemSBulgakov/buildozer-action@v1
      with:
        command: buildozer android debug
        buildozer_version: stable

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Android-APK
        path: bin/*.apk

  # --- СБОРКА ПОД WINDOWS (.EXE) ---
  windows-build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-path: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install kivy plyer pyinstaller

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --onefile --windowed --name="WiFi_Clipboard" main.py

    - name: Upload EXE Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Windows-EXE
        path: dist/WiFi_Clipboard.exe
